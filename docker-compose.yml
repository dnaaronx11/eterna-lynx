services:
  api-gateway:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    env_file:
      - .env
    ports:
      - "3001:3001"
    volumes:
      - ./logs:/app/logs
      - ./.local:/app/.local

  console-web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web
    environment:
      VITE_API_BASE_URL: http://localhost:3001
      WEB_PORT: 5173
    ports:
      - "5173:5173"
    depends_on:
      - api-gateway
